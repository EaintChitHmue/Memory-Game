<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game</title>

    <link rel="stylesheet" href="memory-game.css" />
    <script src="memory-game.js" defer></script>
  </head>

  <body>
    <h1>Memory game</h1>

    <div class="stuff">
      <div class="timer">
        <p>Time: <span style="color: rgb(192, 226, 39)"> 00:00 </span></p>
      </div>
      <div class="count">
        <p>Count: <span style="color: rgb(23, 147, 230)"> 0 </span></p>
      </div>
      <div class="score">
        <p>Score: <span style="color: #b978eb"> 0 </span></p>
      </div>
    </div>

    <div class="start">
      <button>Start</button>
    </div>

    <div class="box"></div>

    <div class="showMessageBox"></div>
  </body>
</html>
